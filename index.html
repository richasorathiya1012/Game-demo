<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Nexus City</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            background-color: #0b0f1a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 120px;
        }

        h1 {
            font-size: 50px;
            color: #00e5ff;
            letter-spacing: 2px;
        }

        p {
            font-size: 18px;
            color: #cfd8dc;
        }

        .glow {
            text-shadow: 0 0 10px #00e5ff;
        }

        .start-btn {
            margin-top: 40px;
            padding: 15px 30px;
            font-size: 18px;
            background-color: #1f2a44;
            color: white;
            border: 1px solid #00e5ff;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        .start-btn:hover {
            background-color: #00e5ff;
            color: black;
            box-shadow: 0 0 15px #00e5ff;
        }

        .warning {
            margin-top: 30px;
            color: #ff5252;
            font-size: 14px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1 class="glow">🌆 NEXUS CITY</h1>

        <p>
            A Smart City Simulation Powered by Artificial Intelligence
        </p>

        <p class="warning">
            ⚠ Your digital identity will be created automatically
        </p>

        <a href="/story1">
            <button class="start-btn">
                ENTER SIMULATION
            </button>
        </a>

    </div>

</body>

</html>
